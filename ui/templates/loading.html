<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trading Agent — Loading</title>
  <style>
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      text-align: center;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #21262d;
      border-top-color: #388bfd;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 1.4rem; font-weight: 700; color: #f0f6ff; margin: 0 0 10px; }
    .msg { font-size: 0.95rem; color: #8b949e; margin-bottom: 28px; }
    .error { color: #f85149; font-size: 0.9rem; margin-top: 16px; }
    .sub {
      font-size: 0.78rem; color: #8b949e;
      border: 1px solid #21262d; border-radius: 6px;
      padding: 10px 20px; display: inline-block;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h2>⬡ Trading Agent</h2>
    <div class="msg" id="msg">{{ status.message }}</div>
    {% if status.error %}
      <div class="error">Error: {{ status.error }}</div>
    {% else %}
      <div class="sub">Running daily scans — this takes ~30 seconds</div>
    {% endif %}
  </div>

  <script>
    // Poll status every 3 seconds — redirect to review page when ready
    function checkStatus() {
      fetch('/api/status')
        .then(r => r.json())
        .then(s => {
          document.getElementById('msg').textContent = s.message;
          if (s.ready) {
            window.location.href = '/';
          } else if (s.error) {
            document.getElementById('msg').textContent = 'Error: ' + s.error;
          }
        })
        .catch(() => {})  // ignore network errors during startup
        .finally(() => setTimeout(checkStatus, 3000));
    }
    setTimeout(checkStatus, 3000);
  </script>
</body>
</html>
